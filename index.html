<!DOCTYPE html>
<html lang='fi'>
<head>
<meta charset='utf-8'>
<title>Kuntosali v10</title>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<style>
  :root{--bg:#000;--card:#0f0f0f;--ink:#ff7a00;--line:#222;--muted:#d8d8d8;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,system-ui,-apple-system,Segoe UI,Roboto;}
  header{position:fixed;top:0;left:0;right:0;text-align:center;
  background:#0b0b0b;padding:14px 0;font-size:20px;border-bottom:1px solid var(--line);z-index:10;}
  .wrap{padding:80px 16px;max-width:860px;margin:0 auto;}
  .card{background:var(--card);padding:16px;border-radius:16px;border:1px solid var(--line);margin-bottom:16px;}
  .field{display:flex;flex-direction:column;margin-bottom:12px;}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  input,select{padding:8px 10px;border-radius:10px;border:1px solid #333;background:#000;color:var(--ink);font-size:15px;}
  .small{max-width:80px;}
  label{font-size:12px;margin-bottom:4px;color:var(--muted);}
  .title{color:var(--ink);font-size:20px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
  h3{margin:0 0 8px 0;color:var(--ink)}
  button{padding:8px 12px;background:var(--ink);color:#000;border:none;border-radius:10px;font-weight:bold;cursor:pointer}
  .btn-ghost{background:#0a0a0a;color:var(--ink);border:1px solid #333}
  .badge{display:inline-flex;align-items:center;gap:6px;background:#1a1a1a;border:1px solid #333;border-radius:999px;padding:6px 10px;margin:4px 6px 0 0}
  .badge button{padding:2px 8px;border-radius:8px;background:#2a2a2a;color:var(--ink);border:1px solid #444}
  hr{border:none;border-top:1px solid var(--line);margin:10px 0}
  table{width:100%;border-collapse:collapse;color:var(--ink);font-size:14px;}
  th,td{padding:10px;border-bottom:1px solid #333;text-align:left}
  th{background:#0b0b0b;position:sticky;top:0}
  .summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  @media (min-width:820px){.summary{grid-template-columns:1fr 1fr 1fr}}
  .summary .box{background:#0b0b0b;border:1px solid #222;border-radius:12px;padding:10px}
  .smalltext{font-size:12px;color:var(--muted)}
  .green{color:#29d67d} .red{color:#ff5c5c}

  /* PIN */
  #pinScreen{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;}
  .pin-title{font-size:26px;font-weight:800;color:#ff7a00;}
  .pin-sub{font-size:14px;color:#888;}
  .pin-dots{display:flex;gap:14px;margin:8px 0;}
  .pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid #444;background:transparent;transition:background 0.15s;}
  .pin-dot.filled{background:#ff7a00;}
  .pin-pad{display:grid;grid-template-columns:repeat(3,76px);gap:10px;}
  .pin-key{height:76px;width:76px;border-radius:16px;background:#111;border:1px solid #333;color:#ff7a00;font-size:26px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
  .pin-key:active{background:#222;}
  .pin-error{color:#f9a8b8;font-weight:700;font-size:14px;min-height:20px;}
  #saveStatus{position:fixed;top:0;left:0;right:0;padding:8px;text-align:center;font-size:13px;font-weight:700;z-index:9998;opacity:0;transition:opacity 0.5s;pointer-events:none;}
</style>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="icons/icon-192.png">
</head>

<body>
<div id="saveStatus"></div>
<div id="pinScreen">
  <div class="pin-title">🏋️ Kuntosali</div>
  <div class="pin-sub">Syötä PIN-koodi</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot"></div><div class="pin-dot"></div>
    <div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-key" data-v="1">1</button><button class="pin-key" data-v="2">2</button><button class="pin-key" data-v="3">3</button>
    <button class="pin-key" data-v="4">4</button><button class="pin-key" data-v="5">5</button><button class="pin-key" data-v="6">6</button>
    <button class="pin-key" data-v="7">7</button><button class="pin-key" data-v="8">8</button><button class="pin-key" data-v="9">9</button>
    <button class="pin-key" data-v="back" style="font-size:18px">←</button><button class="pin-key" data-v="0">0</button><button class="pin-key" data-v="clear" style="font-size:16px">✕</button>
  </div>
  <div class="pin-error" id="pinError"></div>
</div>
<header>Kuntosali</header>

<div class='wrap'>

  <!-- Ohjelma -->
  <div class='card'>
    <div class='title'>Ohjelma</div>
    <div class='row'>
      <select id='program' style='min-width:240px'></select>
      <button id='addProgram'>+ lisää ohjelma</button>
      <button id='resetAll' class='btn-ghost'>Nollaa kaikki</button>
    </div>
  </div>

  <!-- Liikelista -->
  <div class='card'>
    <div class='title'>
      <span>Ohjelman liikkeet</span>
      <button id='toggleExercises' class='btn-ghost'>Piilota</button>
    </div>

    <div id='exerciseBadges' class='row'></div>
    <hr/>

    <div class='row' id="exercisePickerRow">
      <select id='presetExercises' style='min-width:220px'>
        <option value=''>Valitse liike…</option>
        <optgroup label="Aerobinen">
          <option>Kävelymatto</option>
        </optgroup>
        <optgroup label="Keskivartalo">
          <option>Vatsalihakset</option>
          <option>Selkälihakset</option>
        </optgroup>
        <optgroup label="Jalat">
          <option>Etureidet</option>
          <option>Takareidet</option>
          <option>Pohkeet</option>
          <option>Jalkaprässi</option>
        </optgroup>
        <optgroup label="Lantio">
          <option>Lonkan ulkokierto</option>
          <option>Lonkan sisäkierto</option>
        </optgroup>
        <optgroup label="Yläkroppa">
          <option>Rintalihakset</option>
          <option>Soutu</option>
          <option>Leuanveto/ylätalja</option>
          <option>Pystypunnerrus</option>
          <option>Hauiskääntö</option>
          <option>Ojentajat</option>
        </optgroup>
        <option value='oma'>+ Oma liike…</option>
      </select>
      <button id='addExercise'>+ lisää liike</button>
    </div>
    
  </div>

  <!-- Päivän treeni -->
  <div class='card'>
    <div class='title'>Tämän päivän treeni</div>
    <div id='todayEntries'></div>
    <div class='row'>
      <button id='saveDay'>Tallenna</button>
    </div>
  </div>

  <!-- Historia ja CSV -->
  <div class='card'>
    <div class='title'>
      <span>Vertailu</span>
      <button id="toggleHistory" class="btn-ghost">Piilota historia</button>
    </div>

    <div id="summaryBoxes" class="summary"></div>

    <div id="historyContainer">
      <table>
        <thead>
          <tr><th>Päivä</th><th>Liike</th><th>Kg</th><th>Toistot</th><th>Sarjat</th><th>Km</th></tr>
        </thead>
        <tbody id='historyBody'></tbody>
      </table>
    </div>

    <button id='exportCSV'>Vie CSV</button>
    <button id='exportJSON'>Vie JSON</button>
    <button id='importJSON'>Tuo JSON</button>
    <input type="file" id="jsonFileInput" accept="application/json" style="display:none">

  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDswdEF9J0gsHJH6Zo_8BGZrf8DVG3FwYc",
  authDomain: "hakemuspaivakirja.firebaseapp.com",
  projectId: "hakemuspaivakirja",
  storageBucket: "hakemuspaivakirja.firebasestorage.app",
  messagingSenderId: "836133210317",
  appId: "1:836133210317:web:d85131ae272ecf1938c184"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const DATA_DOC = doc(db, "kuntosali", "data");
let isSaving = false;

function showStatus(msg, color){
  const el = document.getElementById('saveStatus');
  el.textContent = msg; el.style.background = color; el.style.color = 'white'; el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 2500);
}

window.fbSave = async function(dataObj){
  if(isSaving) return;
  isSaving = true;
  showStatus('💾 Tallennetaan...','#f97316');
  try {
    localStorage.setItem('gymData_v6', JSON.stringify(dataObj));
    await setDoc(DATA_DOC, { json: JSON.stringify(dataObj) });
    showStatus('✅ Tallennettu','#22c55e');
  } catch(e){
    showStatus('❌ Tallennus epäonnistui','#dc2626');
  }
  isSaving = false;
};

async function fbLoad(){
  try {
    const snap = await getDoc(DATA_DOC);
    if(snap.exists()){
      localStorage.setItem('gymData_v6', snap.data().json);
    } else {
      const existing = localStorage.getItem('gymData_v6');
      if(existing) await window.fbSave(JSON.parse(existing));
    }
  } catch(e){
    showStatus('⚠️ Yhteysvirhe – paikallinen data','#f59e0b');
  }
  if(window.fbLoaded) window.fbLoaded();
}

onSnapshot(DATA_DOC, snap => {
  if(!snap.exists() || isSaving) return;
  try {
    const newData = JSON.parse(snap.data().json);
    localStorage.setItem('gymData_v6', JSON.stringify(newData));
    if(window.reloadData) window.reloadData();
  } catch(e){}
});

// PIN tarkistus
const PIN_SESSION = 'kuntosali_pin_ok';
let pinBuffer = '';

function renderPinDots(){
  document.querySelectorAll('.pin-dot').forEach((d,i) => d.classList.toggle('filled', i < pinBuffer.length));
}

async function checkPin(){
  const err = document.getElementById('pinError');
  try {
    const snap = await getDoc(doc(db, 'kuntosali', 'pin'));
    if(!snap.exists()){ unlock(); return; }
    if(pinBuffer === snap.data().code){
      sessionStorage.setItem(PIN_SESSION, '1');
      unlock();
    } else {
      err.textContent = 'Väärä PIN-koodi';
      pinBuffer = '';
      setTimeout(() => renderPinDots(), 300);
    }
  } catch(e){
    err.textContent = 'Yhteysvirhe, yritä uudelleen';
    pinBuffer = ''; renderPinDots();
  }
}

function unlock(){
  document.getElementById('pinScreen').style.display = 'none';
  fbLoad();
}

function handlePinKey(v){
  const err = document.getElementById('pinError');
  if(v==='clear'){ pinBuffer=''; renderPinDots(); err.textContent=''; return; }
  if(v==='back'){ pinBuffer=pinBuffer.slice(0,-1); renderPinDots(); err.textContent=''; return; }
  if(pinBuffer.length >= 4) return;
  pinBuffer += v; renderPinDots();
  if(pinBuffer.length === 4) checkPin();
}

document.querySelectorAll('.pin-key').forEach(btn => {
  btn.addEventListener('click', () => handlePinKey(btn.dataset.v));
});

if(sessionStorage.getItem(PIN_SESSION)){
  unlock();
} // muuten PIN-näyttö pysyy näkyvissä

</script>
<script>
// --- Data ---
let data = JSON.parse(localStorage.getItem('gymData_v6')||'{}');
if(!data.programs){
  data = {
    programs:[
      {id:id(), name:'Ohjelma A', exercises:['Kävelymatto','Etureidet','Vatsalihakset','Rintalihakset']},
      {id:id(), name:'Ohjelma B', exercises:['Kävelymatto','Takareidet','Selkälihakset','Soutu']}
    ],
    logs:[],
    baseline:{}
  };
} else if(!data.baseline){ data.baseline = {}; }

function saveData(){
  localStorage.setItem('gymData_v6', JSON.stringify(data));
  if(window.fbSave) window.fbSave(data);
}
function id(){ return Math.random().toString(36).slice(2,9); }

// --- Renderers ---
function renderPrograms(){
  const s=document.getElementById('program');
  s.innerHTML='';
  data.programs.forEach(pr=>{
    const o=document.createElement('option'); o.value=pr.id; o.textContent=pr.name; s.appendChild(o);
  });
  if(!s.value && data.programs[0]) s.value=data.programs[0].id;
}
function renderExerciseBadges(){
  const pr=currentProgram(); const box=document.getElementById('exerciseBadges'); box.innerHTML='';
  pr.exercises.forEach((name, idx)=>{
    const b=document.createElement('div'); b.className='badge';
    b.innerHTML = `<span>${name}</span> <button title="Poista">×</button>`;
    b.querySelector('button').onclick = ()=>{
      if(confirm('Poistetaanko liike ohjelmasta?')){
        pr.exercises.splice(idx,1); saveData(); renderExerciseBadges(); renderToday();
      }
    };
    box.appendChild(b);
  });
}
function renderToday(){
  const pr=currentProgram(); const box=document.getElementById('todayEntries'); box.innerHTML='';
  pr.exercises.forEach(ex=>{
    const card=document.createElement('div'); card.className='card';
    if(ex.toLowerCase().includes('matto')){
      card.innerHTML = `<h3>${ex}</h3>
        <div class='row'>
          <div class='field'><label>Kilometrit (km)</label>
          <input class='small' data-ex='${ex}' data-field='km' type='number' step='0.01'></div>
        </div>`;
    } else {
      card.innerHTML = `<h3>${ex}</h3>
        <div class='row'>
          <div class='field'><label>Kg</label><input class='small' data-ex='${ex}' data-field='kg' type='number' step='0.1'></div>
          <div class='field'><label>Toistot</label><input class='small' data-ex='${ex}' data-field='reps' type='number'></div>
          <div class='field'><label>Sarjat</label><input class='small' data-ex='${ex}' data-field='sets' type='number'></div>
        </div>`;
    }
    box.appendChild(card);
  });
}
function renderHistory(){
  const tb=document.getElementById('historyBody'); tb.innerHTML='';
  data.logs.forEach(l=>{
    l.entries.forEach(e=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`<td>${l.date}</td><td>${e.name}</td><td>${clean(e.kg)}</td><td>${clean(e.reps)}</td><td>${clean(e.sets)}</td><td>${clean(e.km)}</td>`;
      tb.appendChild(tr);
    });
  });
  renderSummary();
}
function renderSummary(){
  const pr=currentProgram(); const box=document.getElementById('summaryBoxes'); box.innerHTML='';
  pr.exercises.forEach(name=>{
    const isMatto = name.toLowerCase().includes('matto');
    const metric = isMatto ? 'km' : 'kg';
    const base = data.baseline[name] || {};
    let firstVal = toNum(base[metric]);

    if(firstVal==null){
      const first = findEntry(name,'first',metric);
      firstVal = first? toNum(first[metric]) : null;
    }

    const last = findEntry(name,'last',metric);
    const lastVal = last? toNum(last[metric]) : null;

    let abs=null, pct=null;
    if(firstVal!=null && lastVal!=null){
      abs = lastVal - firstVal;
      pct = firstVal!==0 ? ((lastVal-firstVal)/Math.abs(firstVal))*100 : null;
    }

    const absTxt = abs==null? '-' : fmt(abs)+' '+metric;
    const pctTxt = pct==null? '-' : (pct>=0? `<span class='green'>+${fmt(pct)}%</span>` : `<span class='red'>${fmt(pct)}%</span>`);

    const el=document.createElement('div');
    el.className='box';
    el.innerHTML=`<div class='smalltext'>${name}</div>
    <div><strong>Lähtö (${metric})</strong>: ${firstVal!=null?fmt(firstVal):'-'}<br>
    <strong>Uusin (${metric})</strong>: ${lastVal!=null?fmt(lastVal):'-'}<br>
    <strong>Muutos</strong>: ${absTxt} (${pctTxt})</div>`;
    box.appendChild(el);
  });
}

// --- Helpers ---
function currentProgram(){ return data.programs.find(x=>x.id===program.value) || data.programs[0]; }
function toNum(v){ const n=parseFloat(v); return Number.isFinite(n)? n : null; }
function fmt(n){ return (Math.round(n*10)/10).toString().replace('.', ','); }
function clean(v){ return v==null? '' : v; }
function findEntry(name, which, metric){
  const all=[];
  data.logs.forEach(l=>{
    l.entries.forEach(e=>{
      if(e.name===name && e[metric]!=null && e[metric]!=='') all.push({...e,date:l.date});
    });
  });
  all.sort((a,b)=>a.date.localeCompare(b.date));
  if(all.length===0) return null;
  return which==='first'? all[0] : all[all.length-1];
}

// --- Events ---
addProgram.onclick=()=>{
  const n=prompt('Ohjelman nimi'); if(!n) return;
  data.programs.push({id:id(),name:n,exercises:[]});
  saveData(); renderPrograms(); renderExerciseBadges(); renderToday(); renderHistory();
};
addExercise.onclick=()=>{
  const pr=currentProgram();
  const sel=presetExercises.value;
  if(!sel) return;
  if(sel==='oma'){
    const n=prompt('Oma liike'); if(!n) return; pr.exercises.push(n);
  } else pr.exercises.push(sel);
  saveData(); renderExerciseBadges(); renderToday();
};
resetAll.onclick=()=>{
  if(confirm('Nollataanko kaikki tiedot?')){
    localStorage.removeItem('gymData_v6');
    if(window.fbSave) window.fbSave({programs:[
      {id:id(), name:'Ohjelma A', exercises:['Kävelymatto','Etureidet','Vatsalihakset','Rintalihakset']},
      {id:id(), name:'Ohjelma B', exercises:['Kävelymatto','Takareidet','Selkälihakset','Soutu']}
    ], logs:[], baseline:{}});
    location.reload();
  }
};
program.onchange=()=>{ renderExerciseBadges(); renderToday(); renderHistory(); };

saveDay.onclick=()=>{
  const date=new Date().toISOString().slice(0,10);
  const entries=[];
  document.querySelectorAll('[data-ex]').forEach(inp=>{
    const ex=inp.dataset.ex;
    const f=inp.dataset.field;
    const raw=inp.value;
    if(!entries.find(e=>e.name===ex)) entries.push({name:ex});
    const eobj=entries.find(e=>e.name===ex);
    eobj[f]=raw;

    const isMatto = ex.toLowerCase().includes('matto');
    const metric = isMatto?'km':'kg';
    const num=toNum(raw);
    if(num!=null && (!data.baseline[ex] || data.baseline[ex][metric]==null)){
      if(!data.baseline[ex]) data.baseline[ex]={};
      data.baseline[ex].date=date;
      data.baseline[ex][metric]=num;
    }
  });
  if(entries.length===0){ alert('Ei kirjattavaa.'); return; }
  data.logs.push({date, program: currentProgram().name, entries});
  saveData(); renderHistory(); alert('Tallennettu.');
};

// CSV
exportCSV.onclick=()=>{
  const lines=['paiva;ohjelma;liike;kg;toistot;sarjat;km'];
  data.logs.forEach(l=>{
    l.entries.forEach(e=>{
      lines.push([l.date,l.program,e.name,clean(e.kg),clean(e.reps),clean(e.sets),clean(e.km)].join(';'));
    });
  });
  const blob=new Blob(["\uFEFF"+lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='kuntosali.csv'; a.click();
};

// --- Vie JSON ---
exportJSON.onclick = () => {
  const blob = new Blob(
    ["\uFEFF" + JSON.stringify(data, null, 2)],
    { type: "application/json" }
  );
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "kuntosali_backup.json";
  a.click();
};

// --- Tuo JSON ---
importJSON.onclick = () => {
  document.getElementById("jsonFileInput").click();
};

document.getElementById("jsonFileInput").onchange = (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const obj = JSON.parse(e.target.result);
      if (!obj.programs || !obj.logs) {
        alert("Virheellinen JSON!");
        return;
      }
      data = obj;
      saveData();
      renderPrograms(); renderExerciseBadges(); renderToday(); renderHistory();
      alert("Tietojen tuonti onnistui. Data tallennettu Firebaseen.");
    } catch {
      alert("JSON-luku epäonnistui.");
    }
  };
  reader.readAsText(file);
};

// Näytä/piilota
let hidden=true;
exerciseBadges.style.display='none';
exercisePickerRow.style.display='none';
toggleExercises.textContent='Näytä';
toggleExercises.onclick=()=>{
  hidden=!hidden;
  exerciseBadges.style.display=hidden?'none':'flex';
  exercisePickerRow.style.display=hidden?'none':'flex';
  toggleExercises.textContent=hidden?'Näytä':'Piilota';
};

let historyHidden=true;
historyContainer.style.display='none';
toggleHistory.textContent='Näytä historia';
toggleHistory.onclick=()=>{
  historyHidden=!historyHidden;
  historyContainer.style.display=historyHidden?'none':'block';
  toggleHistory.textContent=historyHidden?'Näytä historia':'Piilota historia';
};

// Init – kutsutaan kun Firebase on ladannut datan
window.fbLoaded = function(){
  data = JSON.parse(localStorage.getItem('gymData_v6')||'{}');
  if(!data.programs) data = { programs:[
    {id:id(), name:'Ohjelma A', exercises:['Kävelymatto','Etureidet','Vatsalihakset','Rintalihakset']},
    {id:id(), name:'Ohjelma B', exercises:['Kävelymatto','Takareidet','Selkälihakset','Soutu']}
  ], logs:[], baseline:{} };
  else if(!data.baseline) data.baseline = {};
  renderPrograms(); renderExerciseBadges(); renderToday(); renderHistory();
};

window.reloadData = function(){
  data = JSON.parse(localStorage.getItem('gymData_v6')||'{}');
  if(!data.baseline) data.baseline = {};
  renderPrograms(); renderExerciseBadges(); renderToday(); renderHistory();
};

// Ei renderöidä heti – odotetaan Firebase-latausta
// renderPrograms(); renderExerciseBadges(); renderToday(); renderHistory();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js');
  });
}
</script>

</body>
